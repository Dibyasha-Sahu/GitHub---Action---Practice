name: Manual Deployment Trigger

on:
  workflow_dispatch:
   input:
    enviroment:
      description: "Select the environment to deploy to"
      required: true
      default: "production"
      options:
        - production
        - staging

jobs:
  manual-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Print selected environment
        run: echo " Deploying to the ${{github.event.inputs.enviroment}} enviroment"
        