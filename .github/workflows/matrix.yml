name: Matrix Workflow

on:
  workflow_dispatch:

jobs:
  matrix-job:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.10, 3.11, 3.12]

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: install python 
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: print the version
        run: python --version