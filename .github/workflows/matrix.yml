name: Matrix Workflow

on:
  workflow-dispatch:

  jobs:
    matrix-job:
      runs-on: ubuntu-latest
      strategy:
        fail-fast: false
        matrix:
          python-versions: [3.10,3.11,3.12]

          steps:
            - name: checkout code
              uses: action/checkout@v4

            - name: install python 
              uses: actions/setup-python@v4
              with:
                python-version: ${{matrix.python-version}}

            - name: print the version
              run: python --version     